{{define "content"}}
<div class="min-h-screen bg-gray-100">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-xl font-bold text-gray-800">管理后台</h1>
                    <a href="/admin/dashboard" class="text-gray-600 hover:text-gray-800">仪表盘</a>
                    <a href="/admin/users" class="text-blue-600 font-medium">用户管理</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-700" id="username"></span>
                    <button onclick="logout()" class="text-red-600 hover:text-red-800">退出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <div class="bg-white rounded-lg shadow">
                <!-- 工具栏 -->
                <div class="p-4 border-b flex justify-between items-center">
                    <h2 class="text-xl font-bold">用户列表</h2>
                    <button onclick="showAddModal()"
                        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        添加用户
                    </button>
                </div>

                <!-- 表格 -->
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户名</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">邮箱</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="bg-white divide-y divide-gray-200">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑模态框 -->
<div id="user-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h3 id="modal-title" class="text-xl font-bold mb-4">添加用户</h3>
        <form id="user-form" class="space-y-4">
            <input type="hidden" name="id">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" name="email" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div id="password-field">
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" onclick="closeModal()"
                    class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50">取消</button>
                <button type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
let editingId = null;

checkAuth();
loadUsers();

async function checkAuth() {
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) {
        window.location.href = '/login';
        return;
    }
    document.getElementById('username').textContent = user.username || '用户';
}

async function loadUsers() {
    const token = localStorage.getItem('token');
    try {
        const res = await fetch('/api/v1/users', {
            headers: {'Authorization': 'Bearer ' + token}
        });
        const result = await res.json();
        
        if (result.code === 401) {
            logout();
            return;
        }
        
        if (result.code === 200) {
            renderUsers(result.data || []);
        }
    } catch (err) {
        console.error('加载用户失败', err);
    }
}

function renderUsers(users) {
    const tbody = document.getElementById('user-list');
    tbody.innerHTML = users.map(user => `
        <tr>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.id}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.username}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.email}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatDate(user.created_at)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm space-x-2">
                <button onclick="editUser(${user.id})" class="text-blue-600 hover:text-blue-800">编辑</button>
                <button onclick="deleteUser(${user.id})" class="text-red-600 hover:text-red-800">删除</button>
            </td>
        </tr>
    `).join('');
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    return new Date(dateStr).toLocaleString('zh-CN');
}

function showAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = '添加用户';
    document.getElementById('user-form').reset();
    document.getElementById('password-field').style.display = 'block';
    document.querySelector('#password-field input').required = true;
    document.getElementById('user-modal').classList.remove('hidden');
}

async function editUser(id) {
    const token = localStorage.getItem('token');
    try {
        const res = await fetch(`/api/v1/users/${id}`, {
            headers: {'Authorization': 'Bearer ' + token}
        });
        const result = await res.json();
        
        if (result.code === 200) {
            const user = result.data;
            editingId = id;
            document.getElementById('modal-title').textContent = '编辑用户';
            const form = document.getElementById('user-form');
            form.username.value = user.username;
            form.email.value = user.email;
            form.password.value = '';
            document.getElementById('password-field').style.display = 'block';
            document.querySelector('#password-field input').required = false;
            document.getElementById('user-modal').classList.remove('hidden');
        }
    } catch (err) {
        alert('获取用户信息失败');
    }
}

async function deleteUser(id) {
    if (!confirm('确定要删除这个用户吗？')) return;
    
    const token = localStorage.getItem('token');
    try {
        const res = await fetch(`/api/v1/users/${id}`, {
            method: 'DELETE',
            headers: {'Authorization': 'Bearer ' + token}
        });
        const result = await res.json();
        
        if (result.code === 200) {
            loadUsers();
        } else {
            alert(result.message || '删除失败');
        }
    } catch (err) {
        alert('删除失败');
    }
}

function closeModal() {
    document.getElementById('user-modal').classList.add('hidden');
}

document.getElementById('user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const token = localStorage.getItem('token');
    
    const data = {
        username: form.username.value,
        email: form.email.value
    };
    
    if (form.password.value) {
        data.password = form.password.value;
    }
    
    try {
        const url = editingId ? `/api/v1/users/${editingId}` : '/api/v1/users';
        const method = editingId ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
            method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if (result.code === 200) {
            closeModal();
            loadUsers();
        } else {
            alert(result.message || '保存失败');
        }
    } catch (err) {
        alert('保存失败');
    }
});

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
}
</script>
{{end}}
