{{define "content"}}
<div class="min-h-screen bg-gray-100">
  <!-- 顶部导航 -->
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-gray-800">管理后台</h1>
        </div>
        <div class="flex items-center space-x-4">
          <span
            class="text-gray-700"
            id="username"
          ></span>
          <button
            onclick="logout()"
            class="text-red-600 hover:text-red-800"
          >
            退出
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-gray-500 text-sm">总用户数</h3>
          <p
            class="text-3xl font-bold text-blue-600"
            id="total-users"
          >
            0
          </p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-gray-500 text-sm">今日新增</h3>
          <p class="text-3xl font-bold text-green-600">0</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-gray-500 text-sm">活跃用户</h3>
          <p class="text-3xl font-bold text-purple-600">0</p>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-bold mb-4">欢迎使用管理系统</h2>
        <p class="text-gray-600">这是一个基于 Go + Gin 的后台管理系统</p>
        <div class="mt-4">
          <a
            href="/admin/users"
            class="text-blue-600 hover:underline"
            >前往用户管理 →</a
          >
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  checkAuth()

  async function checkAuth() {
    const token = localStorage.getItem('token')
    const user = JSON.parse(localStorage.getItem('user') || '{}')

    if (!token) {
      window.location.href = '/login'
      return
    }

    document.getElementById('username').textContent = user.username || '用户'
    loadStats()
  }

  async function loadStats() {
    const token = localStorage.getItem('token')
    try {
      const res = await fetch('/api/v1/users', {
        headers: { Authorization: 'Bearer ' + token }
      })
      const result = await res.json()
      if (result.code === 200) {
        document.getElementById('total-users').textContent = result.data.length
      }
    } catch (err) {
      console.error('加载统计失败', err)
    }
  }

  function logout() {
    localStorage.removeItem('token')
    localStorage.removeItem('user')
    window.location.href = '/login'
  }
</script>
{{end}}
