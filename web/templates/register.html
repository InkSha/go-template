{{define "content"}}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6">用户注册</h2>
        
        <div id="error-msg" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
        <div id="success-msg" class="hidden bg-green-100 text-green-700 p-3 rounded mb-4"></div>
        
        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" required minlength="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" name="email" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" name="confirm_password" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">
                注册
            </button>
        </form>
        
        <p class="mt-4 text-center text-sm text-gray-600">
            已有账号？<a href="/login" class="text-blue-600 hover:underline">立即登录</a>
        </p>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    
    if (form.password.value !== form.confirm_password.value) {
        showError('两次密码输入不一致');
        return;
    }
    
    const data = {
        username: form.username.value,
        email: form.email.value,
        password: form.password.value
    };
    
    try {
        const res = await fetch('/api/v1/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if (result.code === 200) {
            showSuccess('注册成功，3秒后跳转登录页面');
            setTimeout(() => window.location.href = '/login', 3000);
        } else {
            showError(result.message || '注册失败');
        }
    } catch (err) {
        showError('网络错误，请重试');
    }
});

function showError(msg) {
    document.getElementById('success-msg').classList.add('hidden');
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
}

function showSuccess(msg) {
    document.getElementById('error-msg').classList.add('hidden');
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
}
</script>
{{end}}
